<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mestrado UnB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2563eb;
      --dark: #1e293b;
      --light: #f8fafc;
      --text: #334155;
      --secondary: #64748b;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--light);
      color: var(--text);
      line-height: 1.6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      max-width: 800px;
      width: 90%;
      text-align: center;
      background: white;
      padding: 3rem;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
    }

    h1 {
      font-size: 2.5rem;
      color: var(--dark);
      margin-bottom: 1rem;
      line-height: 1.2;
    }

    p {
      font-size: 1.1rem;
      margin-bottom: 2rem;
      color: var(--secondary);
    }

    .actions {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    .cta-button {
      display: inline-block;
      background-color: var(--primary);
      color: white;
      padding: 1.2rem 2.5rem;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      font-size: 1.1rem;
      transition: transform 0.2s, background 0.2s;
      box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
    }

    .cta-button:hover {
      background-color: #1d4ed8;
      transform: translateY(-2px);
    }

    .secondary-link {
      color: var(--primary);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      transition: color 0.2s;
    }

    .secondary-link:hover {
      text-decoration: underline;
      color: #1d4ed8;
    }

    footer {
      margin-top: 3rem;
      padding-top: 2rem;
      border-top: 1px solid #e2e8f0;
      font-size: 0.8rem;
      color: #94a3b8;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Universidade de Brasília</h1>
    <p><strong>Governança de dados na segurança pública: </strong>Diagnóstico nacional à luz do Modelo de Maturidade de
      Dados</p>

    <div class="actions">
      <a href="https://docs.google.com/presentation/d/1kKrsEUQYBSNiw_LXCzHwGwRMWDZFdD4Q" target="_blank"
        class="cta-button" id="btn-access">
        Acessar Apresentação
      </a>

      <a href="https://www.gov.br/governodigital/pt-br/infraestrutura-nacional-de-dados/maturidade-de-dados"
        target="_blank" class="secondary-link">
        Conheça o Modelo de Maturidade de Dados
      </a>
    </div>

    <footer>
      &copy; <span id="year"></span> | Igor Muniz
    </footer>
  </div>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    document.getElementById('btn-access').addEventListener('click', () => {
      console.log('Acesso à apresentação iniciado.');
    });
  </script>
</body>

</html>
